<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- PWA & Mobile App Meta -->
  <meta name="theme-color" content="#07111f" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#07111f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ISP Portal" />
  <meta name="application-name" content="ISP Entertainment Portal" />
  <meta name="msapplication-TileColor" content="#07111f" />
  <meta name="msapplication-tap-highlight" content="no" />

  <!-- SEO -->
  <meta name="description"
    content="ISP Entertainment Portal — Premium local streaming for movies, series, and live TV." />
  <meta name="robots" content="noindex, nofollow" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="ISP Entertainment Portal" />
  <meta property="og:description" content="Premium local streaming for movies, series, and live TV." />
  <meta property="og:image" content="/icons.svg" />

  <!-- Favicon & Icons -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.json" />

  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="dns-prefetch" href="https://images.unsplash.com" />

  <!-- Bengali font for better text rendering -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap"
    as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" />
  </noscript>

  <title>ISP Entertainment Portal</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
