name: Deploy to Production Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Prepare deployment package
        run: node scripts/prepare-deploy.cjs

      - name: Copy files to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: "server-deploy,scripts/deploy.sh"
          target: "/home/deploy/staging-area"
          overwrite: true

      - name: Execute remote deployment script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            STAGING_BASE=${DEPLOY_REMOTE_STAGING_BASE:-/home/deploy/portal-deploy-staging}
            REMOTE_STAGING_AREA="/home/deploy/staging-area"
            STAGING_ROOT="$STAGING_BASE/$TIMESTAMP"
            
            echo "Creating final deployment directory: $STAGING_ROOT"
            mkdir -p "$STAGING_ROOT"

            echo "Moving files from staging area to final directory"
            mv "$REMOTE_STAGING_AREA/server-deploy/dist" "$STAGING_ROOT/dist"
            mv "$REMOTE_STAGING_AREA/server-deploy/backend" "$STAGING_ROOT/backend"
            mv "$REMOTE_STAGING_AREA/deploy.sh" "$STAGING_ROOT/deploy.sh"

            # Clean up the staging area for the next deployment
            rm -rf "$REMOTE_STAGING_AREA/server-deploy"

            chmod +x "$STAGING_ROOT/deploy.sh"

            # Execute the remote script
            export DEPLOY_ENV_FILE_CONTENT='${{ secrets.DEPLOY_ENV_FILE_CONTENT }}'
            export BACKEND_PATH=${DEPLOY_REMOTE_BACKEND_PATH}
            export FRONTEND_PATH=${DEPLOY_REMOTE_FRONTEND_PATH}
            export PID_FILE=${DEPLOY_REMOTE_PID_FILE:-/home/deploy/backend.pid}
            export BACKUP_BASE=${DEPLOY_REMOTE_BACKUP_BASE:-/home/deploy/portal-deploy-backups}
            export STAGING_ROOT=$STAGING_ROOT
            export TIMESTAMP=$TIMESTAMP
            export SUDO_PASSWORD='${{ secrets.DEPLOY_SUDO_PASSWORD }}'
            export SERVICE_NAME=${DEPLOY_REMOTE_SERVICE_NAME:-isp-portal.service}
            export REMOTE_PORT=${DEPLOY_REMOTE_PORT}
            export REMOTE_CORS_ALLOWED_ORIGINS='${{ secrets.DEPLOY_REMOTE_CORS_ALLOWED_ORIGINS }}'
            export REMOTE_PLAYER_CACHE_ROOT=${DEPLOY_REMOTE_PLAYER_CACHE_ROOT}

            bash "$STAGING_ROOT/deploy.sh"
