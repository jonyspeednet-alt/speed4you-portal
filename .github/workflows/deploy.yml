name: Build And Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Prepare deploy package
        run: node scripts/prepare-deploy.cjs

      - name: Upload frontend bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: "server-deploy/frontend/dist/*"
          target: "/var/www/html/portal"
          strip_components: 3
          overwrite: true

      - name: Upload backend package
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: "server-deploy/backend/*"
          target: "/home/${{ secrets.DEPLOY_USER }}/isp-portal-backend"
          strip_components: 2
          overwrite: true

      - name: Restart backend service
        uses: appleboy/ssh-action@v1.2.0
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          envs: TMDB_API_KEY,JWT_SECRET
          script: |
            set -e
            cd /home/${{ secrets.DEPLOY_USER }}/isp-portal-backend
            npm ci --omit=dev
            cat > .env <<EOF
            PORT=3001
            JWT_SECRET=${JWT_SECRET}
            TMDB_API_KEY=${TMDB_API_KEY}
            EOF

            if command -v pm2 >/dev/null 2>&1; then
              pm2 describe isp-portal-backend >/dev/null 2>&1 && pm2 restart isp-portal-backend || pm2 start src/index.js --name isp-portal-backend
              pm2 save
            elif command -v systemctl >/dev/null 2>&1; then
              sudo systemctl restart isp-portal-backend || true
            else
              echo "No known process manager found. Backend files updated; restart manually if needed."
            fi

      - name: Deployment summary
        run: |
          echo "Deployment completed."
          echo "Public site: https://data.speed4you.net/portal"
          echo "API check: https://data.speed4you.net/portal-api/api/content/latest?limit=3"
